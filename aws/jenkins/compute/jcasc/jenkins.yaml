jenkins:
  systemMessage: "infra_perez_wiki's ephemeral Jenkins: call her IPWEJ"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          password: "${ADMIN_PASSWORD}"
  authorizationStrategy:
    globalMatrix:
      permissions:
        - "Overall/Administer:admin"

credentials:
  system:
    domainCredentials:
      - credentials:
          - basicSSHUserPrivateKey:
              scope: GLOBAL
              id: linode-ssh-key
              username: jenkins-deploy
              privateKeySource:
                directEntry:
                  privateKey: "${LINODE_SSH_KEY}"

jobs:
  - script: >
      pipelineJob('deploy-perez-wiki') {
        definition {
          cps {
            script('''
              pipeline {
                agent any
                stages {
                  stage('Deploy') {
                    steps {
                      sshagent(credentials: ['linode-ssh-key']) {
                        sh """
                          ssh -o StrictHostKeyChecking=no jenkins-deploy@$env.LINODE_HOST '
                            cd /home/perez-wiki/perez_wiki &&
                            git pull origin main &&
                            source venv/bin/activate &&
                            pip install --upgrade pip &&
                            pip install -r requirements.txt &&
                            sudo cp /home/perez-wiki/perez_wiki/files/perez_wiki /etc/nginx/sites-available/perez_wiki &&
                            sudo systemctl reload nginx &&
                            sudo cp /home/perez-wiki/perez_wiki/files/perez_wiki.service /etc/systemd/system/perez_wiki.service &&
                            sudo systemctl daemon-reload &&
                            sudo systemctl restart perez_wiki
                          '
                        """
                      }
                    }
                  }
                }
              }
            '''.stripIndent())
            sandbox()
          }
        }
      }
