name: Deploy Jenkins Only

on:
  # Called by perez_wiki's "Deploy via Jenkins" workflow (secrets passed in).
  workflow_call:
    secrets:
      LINODE_SSH_PRIVATE_KEY:
        required: true
      JENKINS_ADMIN_PASSWORD:
        required: true
      EXPORTER_BASIC_AUTH_HASH:
        required: true
      ADMIN_CIDR:
        required: true
  # for testing just jenkins
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-perez-wiki-aws-jenkins
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aws/jenkins/compute
    steps:
      - uses: actions/checkout@v4
        with:
          repository: evolvingsewage/infra_perez_wiki
          ref: main

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::762528398066:role/infra-perez-wiki-github-actions-jenkins
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      - name: Compute state bucket name
        id: bucket
        run: echo "name=infra-perez-wiki-tfstate-$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.bucket.outputs.name }}" \
            -backend-config="region=us-east-1" \
            -backend-config="key=aws-jenkins-compute/terraform.tfstate" \
            -backend-config="use_lockfile=true"

      # -replace forces a fresh instance. Ordinary apply doesn't reliably detect changes.
      - name: Terraform apply
        env:
          TF_VAR_linode_ssh_private_key: ${{ secrets.LINODE_SSH_PRIVATE_KEY }}
          TF_VAR_jenkins_admin_password: ${{ secrets.JENKINS_ADMIN_PASSWORD }}
          TF_VAR_exporter_basic_auth_hash: ${{ secrets.EXPORTER_BASIC_AUTH_HASH }}
          TF_VAR_admin_cidr: ${{ secrets.ADMIN_CIDR }}
        run: terraform apply -auto-approve -replace="aws_instance.jenkins"

      # Polls via SSM, not a direct curl
      - name: Wait for Jenkins to be reachable
        run: |
          instance_id=$(terraform output -raw instance_id)
          bash "$GITHUB_WORKSPACE/.github/scripts/ssm-run-command.sh" "$instance_id" \
            'for i in $(seq 1 30); do curl -sf --max-time 5 http://localhost:8080/login > /dev/null && exit 0; sleep 10; done; exit 1' \
            60

      # The remote script reads the admin password from SSM Parameter Store
      # on the instance itself (its IAM role already allows it), so the
      # password never rides in the Run Command payload 
      - name: Trigger deploy-perez-wiki job
        run: |
          instance_id=$(terraform output -raw instance_id)
          # Jenkins requires a crumb. Let's toss him one. He's earned it.
          remote_script=$(cat <<'SCRIPT'
          admin_password=$(aws ssm get-parameter --with-decryption --region us-east-1 \
            --name /infra-perez-wiki/jenkins/admin-password --query Parameter.Value --output text)
          cookie_jar=$(mktemp)
          crumb=$(curl -sf -c "$cookie_jar" -u "admin:$admin_password" 'http://localhost:8080/crumbIssuer/api/xml?xpath=concat(//crumbRequestField,":",//crumb)')
          curl -sf -b "$cookie_jar" -X POST -u "admin:$admin_password" -H "$crumb" http://localhost:8080/job/deploy-perez-wiki/build
          SCRIPT
          )
          bash "$GITHUB_WORKSPACE/.github/scripts/ssm-run-command.sh" "$instance_id" "$remote_script" 30
