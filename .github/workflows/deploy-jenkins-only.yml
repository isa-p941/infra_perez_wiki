name: Deploy Jenkins Only

on:
  workflow_call:
    secrets:
      LINODE_SSH_PRIVATE_KEY:
        required: true
      JENKINS_ADMIN_PASSWORD:
        required: true
      EXPORTER_BASIC_AUTH_HASH:
        required: true
      ADMIN_CIDR:
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-perez-wiki-aws-jenkins
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aws/jenkins/compute
    steps:
      - uses: actions/checkout@v4
        with:
          repository: evolvingsewage/infra_perez_wiki
          ref: main

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::762528398066:role/infra-perez-wiki-github-actions-jenkins
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      - name: Compute state bucket name
        id: bucket
        run: echo "name=infra-perez-wiki-tfstate-$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.bucket.outputs.name }}" \
            -backend-config="region=us-east-1" \
            -backend-config="key=aws-jenkins-compute/terraform.tfstate" \
            -backend-config="use_lockfile=true"

      # -replace forces a fresh instance. Ordinary apply doesn't reliably detect changes.
      - name: Terraform apply
        env:
          TF_VAR_linode_ssh_private_key: ${{ secrets.LINODE_SSH_PRIVATE_KEY }}
          TF_VAR_jenkins_admin_password: ${{ secrets.JENKINS_ADMIN_PASSWORD }}
          TF_VAR_exporter_basic_auth_hash: ${{ secrets.EXPORTER_BASIC_AUTH_HASH }}
          TF_VAR_admin_cidr: ${{ secrets.ADMIN_CIDR }}
        run: terraform apply -auto-approve -replace="aws_instance.jenkins"

      # Polls via SSM, not a direct curl
      - name: Wait for Jenkins to be reachable
        run: |
          instance_id=$(terraform output -raw instance_id)
          params=$(jq -n '{commands: ["for i in $(seq 1 30); do curl -sf --max-time 5 http://localhost:8080/login > /dev/null && exit 0; sleep 10; done; exit 1"]}')
          # SSM Agent needs time
          command_id=""
          for attempt in $(seq 1 12); do
            command_id=$(aws ssm send-command \
              --instance-ids "$instance_id" \
              --document-name "AWS-RunShellScript" \
              --parameters "$params" \
              --query "Command.CommandId" --output text 2>/tmp/ssm_err) && break
            echo "send-command attempt $attempt failed, retrying in 10s:" >&2
            cat /tmp/ssm_err >&2
            sleep 10
          done
          if [ -z "$command_id" ]; then
            echo "send-command never succeeded" >&2
            exit 1
          fi
          for i in $(seq 1 60); do
            status=$(aws ssm get-command-invocation \
              --command-id "$command_id" --instance-id "$instance_id" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$status" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut) echo "Readiness check failed: $status" >&2; exit 1 ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for SSM command to finish" >&2
          exit 1

      - name: Trigger deploy-perez-wiki job
        env:
          JENKINS_ADMIN_PASSWORD: ${{ secrets.JENKINS_ADMIN_PASSWORD }}
        run: |
          instance_id=$(terraform output -raw instance_id)
          # Jenkins requires a crumb. Let's toss him one. He's earned it.
          remote_script=$(cat <<SCRIPT
          cookie_jar=\$(mktemp)
          crumb=\$(curl -sf -c "\$cookie_jar" -u "admin:$JENKINS_ADMIN_PASSWORD" 'http://localhost:8080/crumbIssuer/api/xml?xpath=concat(//crumbRequestField,":",//crumb)')
          curl -sf -b "\$cookie_jar" -X POST -u "admin:$JENKINS_ADMIN_PASSWORD" -H "\$crumb" http://localhost:8080/job/deploy-perez-wiki/build
          SCRIPT
          )
          params=$(jq -n --arg script "$remote_script" '{commands: [$script]}')
          command_id=""
          for attempt in $(seq 1 12); do
            command_id=$(aws ssm send-command \
              --instance-ids "$instance_id" \
              --document-name "AWS-RunShellScript" \
              --parameters "$params" \
              --query "Command.CommandId" --output text 2>/tmp/ssm_err) && break
            echo "send-command attempt $attempt failed, retrying in 10s:" >&2
            cat /tmp/ssm_err >&2
            sleep 10
          done
          if [ -z "$command_id" ]; then
            echo "send-command never succeeded" >&2
            exit 1
          fi
          for i in $(seq 1 30); do
            status=$(aws ssm get-command-invocation \
              --command-id "$command_id" --instance-id "$instance_id" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$status" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut) echo "Job trigger failed: $status" >&2; exit 1 ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for SSM command to finish" >&2
          exit 1
