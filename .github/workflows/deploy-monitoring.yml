name: Deploy Monitoring

on:
  # to be wired up to THE ONE BUTTON
  workflow_call:
    secrets:
      GRAFANA_ADMIN_PASSWORD:
        required: true
      LINODE_EXPORTER_PASSWORD:
        required: true
      # optional: only needed to scrape the Jenkins box
      JENKINS_EXPORTER_PASSWORD:
        required: false
  # for manual use
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-perez-wiki-azure-monitoring
  cancel-in-progress: false

# Plain identifiers, not secrets (see azure/monitoring/iam). Terraform's
# azurerm provider/backend uses these plus the GitHub OIDC token to auth.
env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ee9fae26-0c8e-4e3b-a30b-1ce55cc0b4c3
  ARM_TENANT_ID: ce562e30-5079-467d-855b-ebb9ba0228d1
  ARM_SUBSCRIPTION_ID: 813b03cb-90d8-4571-aa49-e0715c7536b5

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # az login, needed for tf-init.sh's `az account show` and the pod check.
      - uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.10"

      # cds into the workdir and inits there.
      - name: Terraform init
        run: bash azure/scripts/tf-init.sh azure/monitoring/aks azure-monitoring-aks.tfstate

      # JENKINS_EXPORTER_TARGET is a repo Variable (the EIP, not secret);
      # empty just omits the Jenkins scrape job.
      - name: Terraform apply
        working-directory: azure/monitoring/aks
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          TF_VAR_linode_exporter_password: ${{ secrets.LINODE_EXPORTER_PASSWORD }}
          TF_VAR_jenkins_exporter_target: ${{ vars.JENKINS_EXPORTER_TARGET }}
          TF_VAR_jenkins_exporter_password: ${{ secrets.JENKINS_EXPORTER_PASSWORD }}
        run: terraform apply -auto-approve

      # helm_release wait=true already gates on pod readiness; this just
      # surfaces the running pods in the logs for a demo.
      - name: Show monitoring pods
        run: |
          az aks get-credentials \
            --resource-group infra-perez-wiki-monitoring-rg \
            --name infra-perez-wiki-monitoring \
            --overwrite-existing
          kubectl get pods -n monitoring

      # Renders the access commands into the run's summary panel.
      - name: How To Access Grafana
        run: |
          {
            echo "## Monitoring is up"
            echo ""
            echo "**1. Get cluster credentials:**"
            echo '```'
            echo "az aks get-credentials --resource-group infra-perez-wiki-monitoring-rg --name infra-perez-wiki-monitoring --overwrite-existing"
            echo '```'
            echo "**2. Grafana** port forward setup:"
            echo '```'
            echo "kubectl port-forward -n monitoring svc/grafana 3000:80"
            echo '```'
            echo "Then open http://localhost:3000 (user: admin)"
            echo ""
            echo "**3. Prometheus targets** port forward setup:"
            echo '```'
            echo "kubectl port-forward -n monitoring svc/prometheus-server 9090:80"
            echo '```'
            echo "Then open http://localhost:9090/targets"
          } >> "$GITHUB_STEP_SUMMARY"
